# Cloudflare Pages runtime config for Astro SSR (@astrojs/cloudflare).
# Build command stays in the Pages dashboard (npm run build); this file supplies
# the runtime compatibility flags the adapter needs + the build output directory.
name = "allclean"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Non-secret runtime var: the Cloudflare deploy hook the editor pings on publish.
# (Secrets — EDIT_KEY, SUPABASE_SERVICE_ROLE_KEY — are added in the dashboard, not here.)
[vars]
CF_DEPLOY_HOOK = "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/8d4b58e6-910a-4065-a1cf-b3145e610119"
